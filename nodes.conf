# MeshCore node configuration
# Installed to /usr/local/etc/meshcore/nodes.conf by deploy.sh
# Read by mc_status.sh, mc_trace.sh, and mc_refresh_login.sh

# Contacts for req_status polling and login refresh
# Format: "alias|display_name"
#   alias        — short name used as the 'node' tag in InfluxDB
#   display_name — full contact name as shown in meshcore-cli
STATUS_CONTACTS=(
  "qh_corb|🦷 Quakers Hill Corb"
  "qh_wold|🦷 Quakers Hill Wold"
  "qh_mid|🦷 Quakers Hill Mid"
  "qh_paterson|🦷 QH Paterson"
  "acaciagardens|🦷 Acacia Gardens"
)

# Destinations for trace path testing
# Format: "pubkey_pre:site"
#   pubkey_pre — first 12 hex chars of node's public key (first byte used as routing hash)
#   site       — short name used as the 'site' tag in InfluxDB
TRACE_DESTINATIONS=(
  "4aaaaaa50d88:faulco"
  "2236b54323a4:lapstone"
  "62c6ba722167:quakershill"
  "4d0385b9d942:acaciagardens"
  "cde6cd06be51:qhpaterson"
  "64beefb0250a:hawkeshtsb"
)
